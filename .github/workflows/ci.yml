name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Backend: lint, type-check, unit tests
  # ---------------------------------------------------------------------------
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: trapac_admin
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: trapac_tas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trapac_admin"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql://trapac_admin:ci_password@localhost:5432/trapac_tas_test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Type-check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

  # ---------------------------------------------------------------------------
  # Frontend: type-check, unit tests
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test -- --passWithNoTests

      - name: Build (static export)
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
