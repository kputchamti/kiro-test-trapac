name: Deploy to AWS

on:
  push:
    branches: [main]

permissions:
  id-token: write   # Required for OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::866176997550:role/GitHubActionsDeployRole
          aws-region: ap-southeast-2

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/cloudformation.yml \
            --stack-name my-app-stack \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              Environment=prod \
              ECRBaseUrl=866176997550.dkr.ecr.ap-southeast-2.amazonaws.com

      - name: Deploy ECS services
        run: |
          # Build and push container images
          aws ecr get-login-password | docker login --username AWS --password-stdin 866176997550.dkr.ecr.ap-southeast-2.amazonaws.com
          docker build -t my-service .
          docker tag my-service:latest 866176997550.dkr.ecr.ap-southeast-2.amazonaws.com/my-service:latest
          docker push 866176997550.dkr.ecr.ap-southeast-2.amazonaws.com/my-service:latest
          
          # Force new deployment
          aws ecs update-service --cluster my-cluster --service my-service --force-new-deployment
